---
layout: default
---

{% assign category = page.categories | first %}

<p><a href="{{ '/' | relative_url }}">Back to Home</a></p>
{% if category %}
<p><a href="{{ '/' | append: category | relative_url }}">Back to {{ category | capitalize }}</a></p>
{% endif %}

<p><small>{{ page.date | date: "%B %-d, %Y" }}</small></p>

{{ content }}
